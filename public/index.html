<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Vault | Premium AI Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="mesh-bg"></div>
    <div class="app">
        <header class="header">
            <div class="header-content">
                <div class="badge-premium">PREMIUM AI ACCESS</div>
                <h1>Character Vault</h1>
                <p>The ultimate repository for AI character intelligence and system prompt extraction.</p>
            </div>
        </header>

        <div class="search-wrapper">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="Search the vault..." autocomplete="off">
                <button id="clearSearch" class="clear-btn">×</button>
            </div>
        </div>

        <div id="loading" class="loader">
            <div class="loader-spinner"></div>
            <p>Synchronizing with Intelligence Core...</p>
        </div>

        <main class="main-content">
            <div id="characterGrid" class="grid"></div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Character Vault Pro. Developed for Elite AI Research.</p>
        </footer>

        <div id="characterModal" class="modal">
            <div class="modal-backdrop" id="modalBackdrop"></div>
            <div class="modal-container">
                <div class="modal-header">
                    <h2 id="modalTitle">Intelligence Data</h2>
                    <button class="modal-close" id="closeModal">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="characterInfo"></div>
                    <div id="fetchDetailsSection" class="fetch-section">
                        <button id="fetchDetailsBtn" class="fetch-btn">
                            <span>UNLOCK SYSTEM PROMPT</span>
                        </button>
                    </div>
                    <div id="detailsSection" class="details-section" style="display: none;">
                        <div id="characterDetails"></div>
                        <div class="prompt-section">
                            <div class="prompt-header">
                                <h3>SYSTEM PROMPT</h3>
                                <div class="prompt-actions">
                                    <button id="copyPrompt" class="btn-icon">Copy</button>
                                    <button id="downloadJSON" class="btn-icon">JSON</button>
                                    <button id="downloadTXT" class="btn-icon">TXT</button>
                                </div>
                            </div>
                            <div id="systemPrompt" class="prompt-content"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="toast" class="toast"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
